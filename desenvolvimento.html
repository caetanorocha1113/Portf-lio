<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desenvolvimento | Caetano Rocha</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Estilos específicos para esta página */
        body {
            overflow: hidden; /* Impede scroll na página principal */
        }

        .container-central {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* Moldura do Jogo */
        .area-jogo {
            width: 100%;
            max-width: 700px;
            height: 350px;
            background: #ffffff; /* Fundo branco para o dinossauro aparecer */
            border: 2px solid rgba(184, 184, 209, 0.3);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.7);
            position: relative;
        }

        .area-jogo iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Título e Dica Estilizados */
        h1.status {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            color: #ff3333;
            letter-spacing: 4px;
            margin-bottom: 5px;
            animation: piscar 1.5s infinite;
        }

        p.dica {
            font-family: 'Outfit', sans-serif;
            color: #b8b8d1;
            margin-bottom: 30px;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* Mensagem de Usabilidade embaixo do jogo */
        .aviso-jogo {
            font-family: 'Rajdhani', sans-serif;
            margin-top: 15px;
            color: #666;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        @keyframes piscar {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div id="ruido"></div>
    <div id="ponto"></div>
    <div id="rastro"></div>

    <div class="container-central">
        
        <h1 class="status">[ SETOR EM RESTAURAÇÃO ]</h1>
        <p class="dica">Nó de Desenvolvimento temporariamente offline. Aguarde.</p>

        <div class="area-jogo">
            <iframe src="https://chromedino.com/" title="Chromium Dinosaur Game"></iframe>
        </div>

        <div class="aviso-jogo">
            [ CLIQUE DENTRO DA ÁREA BRANCA E PRESSIONE ESPAÇO ]
        </div>

    </div>

</body>
</html>
